<template>
    <div class="summary-container">
        <!-- Main Panel Header (Hidden on print) -->
        <template if:true={hasAdmission}>
            <div class="summary-header slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_medium noprint">
                <div>
                    <h3 class="panel-title">Admission Summary</h3>
                    <p class="panel-subtitle">Official admission certificate and registration records.</p>
                </div>
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-button 
                        label="Print Certificate" 
                        icon-name="utility:print" 
                        variant="neutral" 
                        onclick={handlePrint}
                        class="print-btn slds-m-right_x-small">
                    </lightning-button>
                    <lightning-button 
                        label="Download PDF" 
                        icon-name="utility:download" 
                        variant="brand" 
                        onclick={handleDownloadPDF}
                        class="action-button-brand">
                    </lightning-button>
                </div>
            </div>

            <!-- Printable Certificate Document Sheet -->
            <div class="certificate-sheet">
                <!-- Branding Header -->
                <div class="cert-header">
                    <div class="cert-logo-wrapper">
                        <lightning-icon icon-name="utility:education" size="medium" class="cert-logo"></lightning-icon>
                    </div>
                    <div class="cert-brand-details">
                        <h2 class="institution-name">STUDENT PORTAL ACADEMY</h2>
                        <p class="institution-tagline">Office of the Registrar & Admissions</p>
                    </div>
                </div>

                <!-- Certificate Title -->
                <div class="cert-title-section">
                    <h1 class="cert-title">Admission Confirmation Certificate</h1>
                    <div class="divider-line"></div>
                </div>

                <!-- Certificate Body Grid -->
                <div class="cert-body">
                    <p class="cert-intro">This is to officially confirm the admission of the student named below for the designated academic program.</p>
                    
                    <div class="slds-grid slds-wrap slds-gutters detail-grid">
                        <!-- Student details -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 detail-column">
                            <h4 class="column-title">Student Information</h4>
                            <div class="detail-row">
                                <span class="detail-label">Full Name</span>
                                <span class="detail-val bold-text">{admission.Student_Name__c}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Enrollment Number</span>
                                <span class="detail-val app-code-text">{admission.Enrollment_Number__c}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Email Address</span>
                                <span class="detail-val">{admission.Student_Application__r.Email__c}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Phone Number</span>
                                <span class="detail-val">{admission.Student_Application__r.Phone__c}</span>
                            </div>
                        </div>

                        <!-- Course details -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12 detail-column">
                            <h4 class="column-title">Academic Program</h4>
                            <div class="detail-row">
                                <span class="detail-label">Course Name</span>
                                <span class="detail-val bold-text">{admission.Course__r.Name}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Course Code</span>
                                <span class="detail-val bold-text">{admission.Course__r.Course_Code__c}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Program Credits</span>
                                <span class="detail-val">{admission.Course__r.Credits__c} Credits</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Tuition Rate</span>
                                <span class="detail-val">${admission.Course__r.Fees__c}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Footer parameters -->
                    <div class="cert-footer-metrics slds-m-top_large">
                        <div class="metric-block">
                            <span class="detail-label">Admission Date</span>
                            <span class="metric-val">{admission.formattedDate}</span>
                        </div>
                        <div class="metric-block">
                            <span class="detail-label">Tuition Status</span>
                            <span class={admission.feeStatusClass}>{admission.feeStatus}</span>
                        </div>
                    </div>
                </div>

                <!-- Certificate Official Notice -->
                <div class="cert-notice-footer">
                    <p class="notice-text">This document serves as an official confirmation of enrollment. It is computer-generated and does not require a physical signature.</p>
                    <div class="verification-seal">
                        <lightning-icon icon-name="utility:lock" size="xx-small" class="seal-icon"></lightning-icon>
                        <span>Verified Registrar Document</span>
                    </div>
                </div>
            </div>

            <!-- Academic Next Steps & Policies Accordion -->
            <div class="slds-m-top_large noprint policy-accordion-container" style="max-width: 800px; margin-left: auto; margin-right: auto;">
                <h4 class="slds-text-heading_small slds-m-bottom_small bold-text" style="color: #1B365D; font-weight: 700;">Academic Next Steps & Instructions</h4>
                <lightning-accordion allow-multiple-sections-open active-section-name="registration">
                    <lightning-accordion-section name="registration" label="1. Class Enrollment & Registration">
                        <p style="color: #475569; font-size: 13px; line-height: 1.5; padding: 4px 0;">Class registration starts one week before the semester. Log into the student portal to choose your class slots.</p>
                    </lightning-accordion-section>
                    <lightning-accordion-section name="fees" label="2. Tuition Payment & Policies">
                        <p style="color: #475569; font-size: 13px; line-height: 1.5; padding: 4px 0;">Ensure all fee payments are cleared. Deferred payment plans can be requested at the Finance Office.</p>
                    </lightning-accordion-section>
                    <lightning-accordion-section name="support" label="3. Help & Student Support Services">
                        <p style="color: #475569; font-size: 13px; line-height: 1.5; padding: 4px 0;">For questions regarding enrollment, contact the Helpdesk or email us at support@studentportal.edu.</p>
                    </lightning-accordion-section>
                </lightning-accordion>
            </div>
        </template>

        <!-- Empty State (No admission found / not approved yet) -->
        <template if:false={hasAdmission}>
            <div class="empty-state">
                <div class="empty-icon-wrapper">
                    <lightning-icon icon-name="utility:clock" size="large" class="empty-icon"></lightning-icon>
                </div>
                <h4>Admission summary unavailable</h4>
                <p>An official admission certificate will be generated automatically once your application has been verified, reviewed, and approved by the admissions committee.</p>
            </div>
        </template>
    </div>
</template>
