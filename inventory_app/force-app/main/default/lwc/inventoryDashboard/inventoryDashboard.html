<template>
    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <div class="dashboard-header slds-m-bottom_medium slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
            <div>
                <h2 class="dashboard-title">Inventory Overview</h2>
                <p class="dashboard-subtitle">Real-time status of products, stock levels, and pending orders</p>
            </div>
            <button class="refresh-button" onclick={handleRefresh} title="Refresh Data">
                <lightning-icon icon-name="utility:refresh" size="x-small" class="refresh-icon" variant="inverse"></lightning-icon>
                <span>Refresh</span>
            </button>
        </div>

        <template if:true={error}>
            <div class="error-container slds-m-bottom_medium">
                <lightning-icon icon-name="utility:error" size="small" variant="error" class="slds-m-right_small"></lightning-icon>
                <span>Error loading dashboard metrics: {error.body.message}</span>
            </div>
        </template>

        <!-- KPI Grid -->
        <div class="slds-grid slds-wrap slds-gutters_direct">
            <!-- Left section: KPI cards (4 columns or grid) -->
            <div class="slds-col slds-size_1-1 slds-medium-size_2-3">
                <div class="slds-grid slds-wrap slds-gutters_direct-small">
                    <!-- Total Products Card -->
                    <div class="slds-col slds-size_1-1 slds-small-size_1-2 slds-m-bottom_small">
                        <div class="kpi-card total-products">
                            <div class="kpi-icon-wrapper">
                                <lightning-icon icon-name="custom:custom55" size="medium"></lightning-icon>
                            </div>
                            <div class="kpi-details">
                                <span class="kpi-label">Total Products</span>
                                <h3 class="kpi-value">{totalProducts}</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Available Stock Card -->
                    <div class="slds-col slds-size_1-1 slds-small-size_1-2 slds-m-bottom_small">
                        <div class="kpi-card available-stock">
                            <div class="kpi-icon-wrapper">
                                <lightning-icon icon-name="custom:custom62" size="medium"></lightning-icon>
                            </div>
                            <div class="kpi-details">
                                <span class="kpi-label">Available Stock</span>
                                <h3 class="kpi-value">{availableStock}</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Low Stock Card -->
                    <div class="slds-col slds-size_1-1 slds-small-size_1-2 slds-m-bottom_small">
                        <div class="kpi-card low-stock">
                            <div class="kpi-icon-wrapper">
                                <lightning-icon icon-name="utility:warning" size="medium" variant="warning"></lightning-icon>
                            </div>
                            <div class="kpi-details">
                                <span class="kpi-label">Low Stock</span>
                                <h3 class="kpi-value">{lowStock}</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Out Of Stock Card -->
                    <div class="slds-col slds-size_1-1 slds-small-size_1-2 slds-m-bottom_small">
                        <div class="kpi-card out-of-stock">
                            <div class="kpi-icon-wrapper">
                                <lightning-icon icon-name="utility:ban" size="medium" variant="error"></lightning-icon>
                            </div>
                            <div class="kpi-details">
                                <span class="kpi-label">Out of Stock</span>
                                <h3 class="kpi-value">{outOfStock}</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Pending POs -->
                    <div class="slds-col slds-size_1-1 slds-small-size_1-2 slds-m-bottom_small">
                        <div class="kpi-card pending-po">
                            <div class="kpi-icon-wrapper">
                                <lightning-icon icon-name="standard:drafts" size="medium"></lightning-icon>
                            </div>
                            <div class="kpi-details">
                                <span class="kpi-label">Pending POs</span>
                                <h3 class="kpi-value">{pendingPurchaseOrders}</h3>
                            </div>
                        </div>
                    </div>

                    <!-- Pending SOs -->
                    <div class="slds-col slds-size_1-1 slds-small-size_1-2 slds-m-bottom_small">
                        <div class="kpi-card pending-so">
                            <div class="kpi-icon-wrapper">
                                <lightning-icon icon-name="standard:orders" size="medium"></lightning-icon>
                            </div>
                            <div class="kpi-details">
                                <span class="kpi-label">Pending SOs</span>
                                <h3 class="kpi-value">{pendingSalesOrders}</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right section: Stock Health Indicator -->
            <div class="slds-col slds-size_1-1 slds-medium-size_1-3 slds-m-bottom_small">
                <div class="chart-card">
                    <h3 class="chart-title">Stock Health</h3>
                    <div class="chart-content">
                        <!-- SVG Circular Chart -->
                        <div class="svg-ring-container">
                            <svg class="svg-ring" viewBox="0 0 100 100">
                                <circle class="svg-ring-bg" cx="50" cy="50" r="40"></circle>
                                <circle class="svg-ring-progress" cx="50" cy="50" r="40" stroke-dasharray={healthStrokeDashArray}></circle>
                            </svg>
                            <div class="svg-ring-label">
                                <div class="percent-val">{stockHealthPercent}%</div>
                                <div class="percent-text">Healthy</div>
                            </div>
                        </div>
                        <div class="chart-legend slds-m-top_medium">
                            <div class="legend-item"><span class="bullet healthy"></span> Healthy / Adequate</div>
                            <div class="legend-item"><span class="bullet warning"></span> Low Stock ({lowStock})</div>
                            <div class="legend-item"><span class="bullet danger"></span> Out of Stock ({outOfStock})</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>
