<template>
    <div class="catalog-container">
        <!-- Catalog Header & Filters -->
        <div class="catalog-header slds-m-bottom_medium">
            <h2 class="catalog-title">Product Catalog</h2>
            <div class="filters-grid slds-m-top_small">
                <div class="search-box">
                    <lightning-input
                        type="search"
                        variant="label-hidden"
                        placeholder="Search products by Name, SKU, description..."
                        value={searchKey}
                        onchange={handleSearchChange}>
                    </lightning-input>
                </div>
                <div class="category-box">
                    <lightning-combobox
                        name="category"
                        variant="label-hidden"
                        value={categoryFilter}
                        options={categoryOptions}
                        onchange={handleCategoryChange}>
                    </lightning-combobox>
                </div>
            </div>
        </div>

        <!-- Catalog Grid -->
        <template if:true={products.data}>
            <template if:true={products.data.length}>
                <div class="slds-grid slds-wrap slds-gutters_direct-small">
                    <template for:each={products.data} for:item="prod">
                        <div key={prod.Id} class="slds-col slds-size_1-1 slds-small-size_1-2 slds-medium-size_1-3 slds-m-bottom_small">
                            <div class="product-card" onclick={handleProductSelect} data-id={prod.Id}>
                                <div class="card-header">
                                    <h3 class="product-name" title={prod.Product_Name__c}>{prod.Product_Name__c}</h3>
                                    <span class="product-sku">{prod.SKU__c}</span>
                                </div>
                                <div class="card-body">
                                    <div class="info-row">
                                        <span class="info-label">Price</span>
                                        <span class="info-val price-val">
                                            <lightning-formatted-number value={prod.Price__c} format-style="currency" currency-code="USD"></lightning-formatted-number>
                                        </span>
                                    </div>
                                    <div class="info-row">
                                        <span class="info-label">Stock Level</span>
                                        <span class="info-val">{prod.Current_Stock__c} units</span>
                                    </div>
                                </div>
                                <div class="card-footer">
                                    <span class="category-badge">{prod.Category__c}</span>
                                    <span class="status-indicator active">Active</span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            <template if:false={products.data.length}>
                <div class="no-results">
                    <lightning-icon icon-name="utility:search" size="medium" variant="warning" class="slds-m-bottom_x-small"></lightning-icon>
                    <p>No products found matching your criteria.</p>
                </div>
            </template>
        </template>
        <template if:true={products.error}>
            <div class="error-container">
                <span>Error loading catalog: {products.error.body.message}</span>
            </div>
        </template>
    </div>
</template>
