<template>
    <div class="tracker-container">
        <!-- Tracker Header -->
        <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_large">
            <div>
                <h3 class="tracker-title">Application Status Tracker</h3>
                <p class="tracker-subtitle">Tracking ID: <span class="app-number">{applicationNumber}</span></p>
            </div>
            <div>
                <span class="slds-badge slds-badge_lightest current-badge">{currentStageLabel}</span>
            </div>
        </div>

        <!-- Rejection Warning Banner -->
        <template if:true={isRejected}>
            <div class="rejection-banner slds-m-bottom_medium">
                <div class="slds-grid slds-grid_vertical-align-center">
                    <lightning-icon icon-name="utility:error" size="small" variant="inverse" class="slds-m-right_small"></lightning-icon>
                    <div>
                        <h4 class="rejection-title">Application Not Approved</h4>
                        <p class="rejection-desc">This application has been declined. Please refer to the formal communication for full details.</p>
                    </div>
                </div>
            </div>
        </template>

        <!-- Progress Timeline (Interactive & Professional) -->
        <div class="slds-m-bottom_xx-large timeline-container">
            <div class="timeline-row">
                <template for:each={timelineSteps} for:item="step">
                    <div key={step.value} class={step.itemClass}>
                        <div class="step-line-before"></div>
                        <div class="step-circle-wrapper">
                            <div class="step-circle">
                                <lightning-icon icon-name={step.iconName} size="xx-small" variant={step.iconVariant}></lightning-icon>
                            </div>
                        </div>
                        <div class="step-line-after"></div>
                        <div class="step-text-container">
                            <h4 class="step-label">{step.label}</h4>
                            <p class="step-status-tag">{step.statusTag}</p>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Info Card and Sub Statuses -->
        <div class="slds-grid slds-wrap slds-gutters">
            <!-- Phase Description Card -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12 slds-m-bottom_medium">
                <div class="info-card">
                    <div class="slds-m-bottom_x-small">
                        <span class={statusHeaderClass}>Phase Detail: {currentStageLabel}</span>
                    </div>
                    <p class="status-desc-text">{statusDescription}</p>
                </div>
            </div>

            <!-- Sub Status Checklist -->
            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-m-bottom_medium">
                <div class="sub-status-card">
                    <h4 class="sub-status-title">Process Checklist</h4>
                    <ul class="checklist-list">
                        <li class="checklist-item">
                            <span class="checklist-label">Document Verification</span>
                            <span class={docBadgeClass}>{docStatus}</span>
                        </li>
                        <li class="checklist-item">
                            <span class="checklist-label">Admission Status</span>
                            <span class={admBadgeClass}>{admStatus}</span>
                        </li>
                        <li class="checklist-item">
                            <span class="checklist-label">Payment Status</span>
                            <span class={paymentBadgeClass}>{paymentStatus}</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</template>
